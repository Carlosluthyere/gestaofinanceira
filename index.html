<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-10">

    <!-- Header / Saldo -->
    <div class="bg-indigo-600 p-6 pb-20 rounded-b-[2rem] shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center text-white">
            <div>
                <p class="text-indigo-200 text-sm">Saldo Total</p>
                <h1 id="total-balance" class="text-3xl font-bold">R$ 0,00</h1>
            </div>
            <div class="bg-indigo-500 p-3 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="User12 19l-7-7 7-7m5 14l-7-7 7-7" />
                </svg>
            </div>
        </div>
    </div>

    <!-- Cards de Resumo -->
    <div class="max-w-md mx-auto px-4 -mt-12 grid grid-cols-2 gap-4">
        <div class="glass p-4 rounded-2xl shadow-sm border border-white">
            <p class="text-gray-500 text-xs uppercase font-semibold">Entradas</p>
            <p id="total-income" class="text-emerald-600 font-bold text-lg">R$ 0,00</p>
        </div>
        <div class="glass p-4 rounded-2xl shadow-sm border border-white">
            <p class="text-gray-500 text-xs uppercase font-semibold">Saídas</p>
            <p id="total-expense" class="text-rose-600 font-bold text-lg">R$ 0,00</p>
        </div>
    </div>

    <!-- Formulário de Transação -->
    <div class="max-w-md mx-auto mt-8 px-4">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h3 class="text-gray-800 font-bold mb-4">Nova Transação</h3>
            <div class="space-y-4">
                <input type="text" id="desc" placeholder="Descrição (ex: Almoço)" class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <input type="number" id="amount" placeholder="Valor R$" class="w-full p-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                
                <div class="flex gap-2">
                    <button onclick="addTransaction('income')" class="flex-1 bg-emerald-50 text-emerald-600 font-bold py-3 rounded-xl hover:bg-emerald-100 transition">↑ Entrada</button>
                    <button onclick="addTransaction('expense')" class="flex-1 bg-rose-50 text-rose-600 font-bold py-3 rounded-xl hover:bg-rose-100 transition">↓ Saída</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Lista de Transações -->
    <div class="max-w-md mx-auto mt-8 px-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-gray-800 font-bold">Últimas Atividades</h3>
            <button onclick="clearAll()" class="text-xs text-gray-400 hover:text-rose-500">Limpar tudo</button>
        </div>
        <div id="transaction-list" class="space-y-3">
            <!-- As transações aparecerão aqui -->
            <p class="text-center text-gray-400 py-10 text-sm">Nenhuma transação registrada.</p>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('my_finances')) || [];

        function updateUI() {
            const list = document.getElementById('transaction-list');
            const balanceEl = document.getElementById('total-balance');
            const incomeEl = document.getElementById('total-income');
            const expenseEl = document.getElementById('total-expense');

            list.innerHTML = '';
            
            let income = 0;
            let expense = 0;

            transactions.forEach((t, index) => {
                const isIncome = t.type === 'income';
                const amount = parseFloat(t.amount);
                
                if (isIncome) income += amount;
                else expense += amount;

                list.innerHTML += `
                    <div class="flex items-center justify-between bg-white p-4 rounded-xl shadow-sm border-l-4 ${isIncome ? 'border-emerald-500' : 'border-rose-500'}">
                        <div>
                            <p class="text-sm font-semibold text-gray-800">${t.desc}</p>
                            <p class="text-xs text-gray-400">${new Date().toLocaleDateString()}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold ${isIncome ? 'text-emerald-600' : 'text-rose-600'}">
                                ${isIncome ? '+' : '-'} R$ ${amount.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                            </p>
                            <button onclick="remove(${index})" class="text-[10px] text-gray-300 hover:text-rose-500 uppercase font-bold">Remover</button>
                        </div>
                    </div>
                `;
            });

            const total = income - expense;
            balanceEl.innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            incomeEl.innerText = `R$ ${income.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            expenseEl.innerText = `R$ ${expense.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            
            localStorage.setItem('my_finances', JSON.stringify(transactions));
            
            if (transactions.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 py-10 text-sm">Nenhuma transação registrada.</p>';
            }
        }

        function addTransaction(type) {
            const desc = document.getElementById('desc').value;
            const amount = document.getElementById('amount').value;

            if (!desc || !amount) return alert("Preencha todos os campos!");

            transactions.unshift({ desc, amount, type });
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            updateUI();
        }

        function remove(index) {
            transactions.splice(index, 1);
            updateUI();
        }

        function clearAll() {
            if(confirm("Deseja apagar todo o histórico?")) {
                transactions = [];
                updateUI();
            }
        }

        updateUI();
    </script>
</body>
</html>
