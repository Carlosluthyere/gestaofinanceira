<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Pro v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-10">

    <div class="bg-indigo-600 p-6 pb-20 rounded-b-[2rem] shadow-lg text-center">
        <div class="max-w-md mx-auto flex justify-between items-center text-white">
            <div class="text-left">
                <p class="text-indigo-200 text-sm">Saldo Total</p>
                <h1 id="total-balance" class="text-3xl font-bold">R$ 0,00</h1>
            </div>
            <div class="bg-indigo-500 p-3 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 -mt-12 grid grid-cols-2 gap-4">
        <div class="glass p-4 rounded-2xl shadow-sm border border-white">
            <p class="text-gray-500 text-xs uppercase font-semibold text-center">Entradas</p>
            <p id="total-income" class="text-emerald-600 font-bold text-lg text-center">R$ 0,00</p>
        </div>
        <div class="glass p-4 rounded-2xl shadow-sm border border-white">
            <p class="text-gray-500 text-xs uppercase font-semibold text-center">Saídas</p>
            <p id="total-expense" class="text-rose-600 font-bold text-lg text-center">R$ 0,00</p>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-8 px-4">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h3 class="text-gray-800 font-bold mb-4">Nova Transação</h3>
            <div class="space-y-4">
                <input type="text" id="desc" placeholder="Descrição" class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="number" id="amount" placeholder="Valor R$" class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500">
                <div class="flex gap-2">
                    <button onclick="addTransaction('income')" class="flex-1 bg-emerald-50 text-emerald-600 font-bold py-3 rounded-xl hover:bg-emerald-100 transition-colors">↑ Entrada</button>
                    <button onclick="addTransaction('expense')" class="flex-1 bg-rose-50 text-rose-600 font-bold py-3 rounded-xl hover:bg-rose-100 transition-colors">↓ Saída</button>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-8 px-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-gray-800 font-bold">Últimas Atividades</h3>
            <button onclick="clearAll()" class="text-xs text-gray-400 hover:text-rose-500">Limpar tudo</button>
        </div>
        <div id="transaction-list" class="space-y-3 mb-8">
            </div>
    </div>

    <div class="max-w-md mx-auto px-4 mt-4">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h3 class="text-gray-800 font-bold mb-4">Fluxo de Caixa (7 dias)</h3>
            <canvas id="cashFlowChart" height="150"></canvas>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('my_finances')) || [];
        let chartInstance = null;

        function addTransaction(type) {
            const desc = document.getElementById('desc').value;
            const amount = document.getElementById('amount').value;
            const date = new Date().toISOString().split('T')[0];

            if (!desc || !amount) return alert("Por favor, preencha a descrição e o valor.");

            transactions.unshift({ 
                desc, 
                amount: parseFloat(amount), 
                type, 
                date 
            });

            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('transaction-list');
            const balanceEl = document.getElementById('total-balance');
            const incomeEl = document.getElementById('total-income');
            const expenseEl = document.getElementById('total-expense');

            list.innerHTML = '';
            let income = 0, expense = 0;

            transactions.forEach((t, index) => {
                const isIncome = t.type === 'income';
                if (isIncome) income += t.amount; else expense += t.amount;

                list.innerHTML += `
                    <div class="flex items-center justify-between bg-white p-4 rounded-xl shadow-sm border-l-4 ${isIncome ? 'border-emerald-500' : 'border-rose-500'}">
                        <div>
                            <p class="text-sm font-semibold text-gray-800">${t.desc}</p>
                            <p class="text-xs text-gray-400">${new Date(t.date).toLocaleDateString('pt-BR')}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold ${isIncome ? 'text-emerald-600' : 'text-rose-600'}">
                                ${isIncome ? '+' : '-'} R$ ${t.amount.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                            </p>
                            <button onclick="remove(${index})" class="text-[10px] text-gray-300 hover:text-rose-500 uppercase font-bold">Remover</button>
                        </div>
                    </div>
                `;
            });

            if (transactions.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 py-4 text-sm">Nenhuma atividade registrada.</p>';
            }

            balanceEl.innerText = `R$ ${(income - expense).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            incomeEl.innerText = `R$ ${income.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            expenseEl.innerText = `R$ ${expense.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            
            localStorage.setItem('my_finances', JSON.stringify(transactions));
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('cashFlowChart').getContext('2d');
            
            // Gerar labels dos últimos 7 dias
            const last7Days = [...Array(7)].map((_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - i);
                return d.toISOString().split('T')[0];
            }).reverse();

            const dataIn = last7Days.map(day => 
                transactions.filter(t => t.date === day && t.type === 'income').reduce((sum, t) => sum + t.amount, 0)
            );
            const dataOut = last7Days.map(day => 
                transactions.filter(t => t.date === day && t.type === 'expense').reduce((sum, t) => sum + t.amount, 0)
            );

            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last7Days.map(d => d.split('-').reverse().slice(0,2).join('/')),
                    datasets: [
                        { label: 'Entradas', data: dataIn, borderColor: '#10b981', tension: 0.4, fill: false, pointRadius: 0 },
                        { label: 'Saídas', data: dataOut, borderColor: '#f43f5e', tension: 0.4, fill: false, pointRadius: 0 }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, display: false },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function remove(index) {
            transactions.splice(index, 1);
            updateUI();
        }

        function clearAll() {
            if(confirm("Deseja apagar todo o histórico?")) {
                transactions = [];
                updateUI();
            }
        }

        // Inicialização
        updateUI();
    </script>
</body>
</html>
