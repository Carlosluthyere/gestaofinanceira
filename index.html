<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Pro v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        
        /* Overlay do Tutorial */
        #tutorial-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; align-items: center; justify-content: center; padding: 20px; }
        .step-card { background: white; padding: 24px; border-radius: 20px; max-width: 320px; width: 100%; text-align: center; }

        /* Animação Pulsante para Chamada de Atenção */
        .pulse-btn {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(79, 70, 229, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(79, 70, 229, 0); }
            100% { box-shadow: 0 0 0 0px rgba(79, 70, 229, 0); }
        }

        /* Tooltip de Primeiro Acesso */
        #first-access-tip {
            position: fixed;
            bottom: 85px;
            right: 24px;
            background: #4f46e5;
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            z-index: 45;
            display: none;
        }
        #first-access-tip::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 15px;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #4f46e5;
        }
    </style>
</head>
<body class="pb-10">

    <div id="first-access-tip" class="shadow-xl">Conheça o App 🚀</div>

    <div id="tutorial-overlay">
        <div class="step-card shadow-2xl">
            <div id="step-content">
                <h2 class="text-indigo-600 font-bold text-xl mb-2" id="step-title">Bem-vindo!</h2>
                <p class="text-gray-600 text-sm mb-6" id="step-text">Vamos aprender a usar seu novo gestor financeiro?</p>
            </div>
            <div class="flex gap-2">
                <button onclick="closeTutorial()" class="flex-1 py-2 text-gray-400 text-sm font-semibold">Pular</button>
                <button onclick="nextStep()" id="next-btn" class="flex-1 py-2 bg-indigo-600 text-white rounded-xl font-bold">Próximo</button>
            </div>
        </div>
    </div>

    <button id="help-btn" onclick="startTutorial()" class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 text-white rounded-full shadow-lg z-40 flex items-center justify-center font-bold text-2xl pulse-btn hover:scale-110 transition-transform">?</button>

    <div class="bg-indigo-600 p-6 pb-20 rounded-b-[2rem] shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center text-white">
            <div class="text-left">
                <p class="text-indigo-200 text-sm">Saldo Real (Pago)</p>
                <h1 id="total-balance" class="text-3xl font-bold">R$ 0,00</h1>
            </div>
            <div class="bg-indigo-500 p-3 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 -mt-12 grid grid-cols-2 gap-4">
        <div class="glass p-4 rounded-2xl shadow-sm border border-white">
            <p class="text-gray-500 text-xs uppercase font-semibold text-center">Entradas</p>
            <p id="total-income" class="text-emerald-600 font-bold text-lg text-center">R$ 0,00</p>
        </div>
        <div class="glass p-4 rounded-2xl shadow-sm border border-white">
            <p class="text-gray-500 text-xs uppercase font-semibold text-center">Saídas/Pendências</p>
            <p id="total-pending" class="text-orange-500 font-bold text-lg text-center">R$ 0,00</p>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-8 px-4">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h3 class="text-gray-800 font-bold mb-4">Nova Movimentação</h3>
            <div class="space-y-4">
                <input type="text" id="desc" placeholder="Descrição" class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500">
                <input type="number" id="amount" placeholder="Valor R$" class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500">
                
                <div class="grid grid-cols-2 gap-2">
                    <select id="is-debt" class="p-3 rounded-xl border border-gray-200 outline-none bg-gray-50 text-sm text-gray-600">
                        <option value="false">Pagar Agora</option>
                        <option value="true">Pagar Depois</option>
                    </select>
                    <input type="date" id="date-input" class="p-3 rounded-xl border border-gray-200 outline-none bg-gray-50 text-sm text-gray-600">
                </div>

                <div class="flex gap-2">
                    <button onclick="addTransaction('income')" class="flex-1 bg-emerald-50 text-emerald-600 font-bold py-3 rounded-xl hover:bg-emerald-100 transition-colors">↑ Entrada</button>
                    <button onclick="addTransaction('expense')" class="flex-1 bg-rose-50 text-rose-600 font-bold py-3 rounded-xl hover:bg-rose-100 transition-colors">↓ Saída</button>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 mt-8">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <h3 class="text-gray-800 font-bold mb-4 text-sm">Fluxo Diário (7 dias)</h3>
            <canvas id="cashFlowChart" height="150"></canvas>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-8 px-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-gray-800 font-bold">Atividades e Vencimentos</h3>
            <button onclick="clearAll()" class="text-xs text-gray-400 hover:text-rose-500">Limpar tudo</button>
        </div>
        <div id="transaction-list" class="space-y-3 mb-8"></div>
    </div>

    <script>
        document.getElementById('date-input').valueAsDate = new Date();
        let transactions = JSON.parse(localStorage.getItem('my_finances')) || [];
        let chartInstance = null;

        // LÓGICA DO TUTORIAL E CHAMADA DE ATENÇÃO
        let currentStep = 0;
        const steps = [
            { title: "Saldo Real", text: "Aqui você vê apenas o que já foi pago ou recebido." },
            { title: "Entradas e Pendências", text: "Entradas são ganhos. Pendências são dívidas que você ainda não marcou como pagas." },
            { title: "Pagar Depois", text: "Agende suas contas. Elas só saem do saldo quando você der o 'Check'." },
            { title: "Gráfico de Cobra", text: "Veja a evolução do seu dinheiro dia após dia." }
        ];

        // Verificar primeiro acesso
        window.onload = () => {
            const hasSeen = localStorage.getItem('tutorial_seen');
            if (!hasSeen) {
                document.getElementById('first-access-tip').style.display = 'block';
            }
            updateUI();
        };

        function startTutorial() {
            localStorage.setItem('tutorial_seen', 'true');
            document.getElementById('first-access-tip').style.display = 'none';
            document.getElementById('help-btn').classList.remove('pulse-btn');
            currentStep = 0;
            document.getElementById('tutorial-overlay').style.display = 'flex';
            showStep();
        }

        function showStep() {
            document.getElementById('step-title').innerText = steps[currentStep].title;
            document.getElementById('step-text').innerText = steps[currentStep].text;
            document.getElementById('next-btn').innerText = currentStep === steps.length - 1 ? "Entendi!" : "Próximo";
        }

        function nextStep() {
            if (currentStep < steps.length - 1) {
                currentStep++;
                showStep();
            } else {
                closeTutorial();
            }
        }

        function closeTutorial() {
            document.getElementById('tutorial-overlay').style.display = 'none';
        }

        // FUNÇÕES DO APP
        function addTransaction(type) {
            const desc = document.getElementById('desc').value;
            const amount = document.getElementById('amount').value;
            const isDebt = document.getElementById('is-debt').value === 'true';
            const date = document.getElementById('date-input').value;
            if (!desc || !amount || !date) return alert("Preencha tudo!");
            transactions.unshift({ desc, amount: parseFloat(amount), type, date, isDebt, paid: !isDebt });
            document.getElementById('desc').value = '';
            document.getElementById('amount').value = '';
            updateUI();
        }

        function togglePaid(index) {
            transactions[index].paid = !transactions[index].paid;
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('transaction-list');
            const balanceEl = document.getElementById('total-balance');
            const incomeEl = document.getElementById('total-income');
            const pendingEl = document.getElementById('total-pending');
            list.innerHTML = '';
            let income = 0, expense = 0, pending = 0;
            transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            transactions.forEach((t, index) => {
                const isIncome = t.type === 'income';
                if (t.paid) { if (isIncome) income += t.amount; else expense += t.amount; } 
                else { pending += t.amount; }
                const formattedDate = new Date(t.date + 'T12:00:00').toLocaleDateString('pt-BR');
                list.innerHTML += `
                    <div class="flex items-center justify-between bg-white p-4 rounded-xl shadow-sm border-l-4 ${t.paid ? (isIncome ? 'border-emerald-500' : 'border-rose-500') : 'border-orange-400'} ${t.paid ? '' : 'bg-orange-50/20'}">
                        <div>
                            <div class="flex items-center gap-2">
                                <p class="text-sm font-semibold text-gray-800 ${t.paid ? '' : 'text-orange-700'}">${t.desc}</p>
                                ${t.isDebt ? `<span class="text-[9px] px-1.5 py-0.5 rounded ${t.paid ? 'bg-emerald-100 text-emerald-600' : 'bg-orange-100 text-orange-600'} font-bold uppercase">${t.paid ? 'PAGO' : 'PENDENTE'}</span>` : ''}
                            </div>
                            <p class="text-xs text-gray-400">${formattedDate}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="text-right">
                                <p class="font-bold ${isIncome ? 'text-emerald-600' : 'text-rose-600'} ${t.paid ? '' : 'opacity-50'}">
                                    ${isIncome ? '+' : '-'} R$ ${t.amount.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                                </p>
                                <button onclick="remove(${index})" class="text-[10px] text-gray-300 hover:text-rose-500 uppercase font-bold">Remover</button>
                            </div>
                            ${t.isDebt ? `<button onclick="togglePaid(${index})" class="p-2 rounded-full ${t.paid ? 'bg-emerald-500 text-white' : 'bg-white border-2 border-orange-300 text-orange-400'}"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg></button>` : ''}
                        </div>
                    </div>`;
            });
            balanceEl.innerText = `R$ ${(income - expense).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            incomeEl.innerText = `R$ ${income.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            pendingEl.innerText = `R$ ${pending.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            localStorage.setItem('my_finances', JSON.stringify(transactions));
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('cashFlowChart').getContext('2d');
            const last7Days = [...Array(7)].map((_, i) => { const d = new Date(); d.setDate(d.getDate() - i); return d.toISOString().split('T')[0]; }).reverse();
            const dataIn = last7Days.map(day => transactions.filter(t => t.date === day && t.type === 'income' && t.paid).reduce((sum, t) => sum + t.amount, 0));
            const dataOut = last7Days.map(day => transactions.filter(t => t.date === day && t.type === 'expense' && t.paid).reduce((sum, t) => sum + t.amount, 0));
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last7Days.map(d => d.split('-').reverse().slice(0,2).join('/')),
                    datasets: [
                        { label: 'Entradas', data: dataIn, borderColor: '#10b981', tension: 0.4, fill: false, pointRadius: 2, borderWidth: 3 },
                        { label: 'Saídas', data: dataOut, borderColor: '#f43f5e', tension: 0.4, fill: false, pointRadius: 2, borderWidth: 3 }
                    ]
                },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }
        function remove(index) { transactions.splice(index, 1); updateUI(); }
        function clearAll() { if(confirm("Apagar tudo?")) { transactions = []; updateUI(); } }
    </script>
</body>
</html>
