<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Fácil - Supabase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .hidden { display: none; }
        canvas { max-height: 180px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-10">

    <div id="screen-login" class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl w-full max-w-md border border-gray-100 text-center">
            <h2 class="text-2xl font-bold text-gray-800 mb-8">Finanças Fácil</h2>
            <div class="space-y-4 text-left">
                <input type="email" id="login-email" placeholder="E-mail" class="w-full p-4 rounded-2xl bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <input type="password" id="login-pass" placeholder="Senha" class="w-full p-4 rounded-2xl bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-700">Entrar</button>
                <p class="text-center text-sm text-gray-500">Novo? <button onclick="showScreen('signup')" class="text-indigo-600 font-bold underline">Criar conta</button></p>
            </div>
        </div>
    </div>

    <div id="screen-signup" class="min-h-screen flex items-center justify-center px-4 hidden">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl w-full max-w-md border border-gray-100 text-center">
            <h2 class="text-2xl font-bold mb-8">Novo Cadastro</h2>
            <div class="space-y-4 text-left">
                <input type="text" id="reg-name" placeholder="Nome" class="w-full p-4 rounded-2xl bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <input type="email" id="reg-email" placeholder="E-mail" class="w-full p-4 rounded-2xl bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <input type="password" id="reg-pass" placeholder="Senha" class="w-full p-4 rounded-2xl bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <button onclick="handleSignup()" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-2xl hover:bg-emerald-600">Cadastrar</button>
                <button onclick="showScreen('login')" class="w-full text-gray-400 text-sm">Voltar</button>
            </div>
        </div>
    </div>

    <div id="screen-app" class="hidden">
        <div class="bg-indigo-600 p-6 pb-24 rounded-b-[2.5rem] shadow-lg">
            <div class="max-w-md mx-auto flex justify-between items-center text-white">
                <div>
                    <p class="text-indigo-200 text-xs font-bold uppercase tracking-widest">Saldo Disponível</p>
                    <h1 id="total-balance" class="text-4xl font-bold">R$ 0,00</h1>
                </div>
                <button onclick="logout()" class="bg-white/10 p-3 rounded-2xl hover:bg-white/20 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="max-w-md mx-auto px-4 -mt-12 grid grid-cols-2 gap-4">
            <div class="glass p-5 rounded-[2rem] shadow-sm border border-white">
                <p class="text-gray-400 text-[10px] uppercase font-bold mb-1">Entradas</p>
                <p id="total-income" class="text-emerald-600 font-black text-xl">R$ 0,00</p>
            </div>
            <div class="glass p-5 rounded-[2rem] shadow-sm border border-white">
                <p class="text-gray-400 text-[10px] uppercase font-bold mb-1">Pendências</p>
                <p id="total-pending" class="text-orange-500 font-black text-xl">R$ 0,00</p>
            </div>
        </div>

        <div class="max-w-md mx-auto mt-6 px-4">
            <div class="bg-white p-5 rounded-[2.5rem] shadow-sm border border-gray-100">
                <h3 class="text-gray-800 font-bold mb-4 text-xs uppercase tracking-widest flex items-center gap-2">
                    <span class="w-2 h-4 bg-indigo-600 rounded-full"></span> Fluxo Confirmado
                </h3>
                <canvas id="cashFlowChart"></canvas>
            </div>
        </div>

        <div class="max-w-md mx-auto mt-6 px-4">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100">
                <h3 class="text-gray-800 font-bold mb-4">Novo Lançamento</h3>
                <div class="space-y-3">
                    <input type="text" id="desc" placeholder="Descrição" class="w-full p-4 rounded-2xl border border-gray-100 bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    <input type="number" id="amount" placeholder="Valor R$" class="w-full p-4 rounded-2xl border border-gray-100 bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="is-debt" class="p-4 rounded-2xl border border-gray-100 bg-gray-50 text-sm outline-none">
                            <option value="false">Pago/Recebido Agora</option>
                            <option value="true">Agendar (Pendente)</option>
                        </select>
                        <input type="date" id="date-input" class="p-4 rounded-2xl border border-gray-100 bg-gray-50 text-sm outline-none">
                    </div>
                    <div class="flex gap-3 pt-2">
                        <button onclick="addTransaction('income')" class="flex-1 bg-emerald-500 text-white font-bold py-4 rounded-2xl hover:bg-emerald-600 transition-all">Entrada</button>
                        <button onclick="addTransaction('expense')" class="flex-1 bg-rose-500 text-white font-bold py-4 rounded-2xl hover:bg-rose-600 transition-all">Saída</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="max-w-md mx-auto mt-8 px-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-gray-800 font-bold text-lg">Atividades</h3>
                <button onclick="setFilter('all')" class="text-xs text-indigo-600 font-bold">Ver Tudo</button>
            </div>

            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2 mb-4">
                <button onclick="setFilter('all')" id="filter-all" class="filter-btn px-5 py-2 rounded-full bg-indigo-600 text-white text-xs font-bold">Tudo</button>
                <button onclick="setFilter('today')" id="filter-today" class="filter-btn px-5 py-2 rounded-full bg-white text-gray-500 text-xs font-bold border border-gray-100">Hoje</button>
                <button onclick="setFilter('pending')" id="filter-pending" class="filter-btn px-5 py-2 rounded-full bg-white text-gray-500 text-xs font-bold border border-gray-100">Pendentes</button>
            </div>

            <div id="transaction-list" class="space-y-3 mb-24"></div>
        </div>
    </div>

    <script>
        // INICIALIZAÇÃO SUPABASE CORRIGIDA
        const SUPABASE_URL = "https://jhzosdgkbghivnseekme.supabase.co";
        const SUPABASE_KEY = "sb_publishable_6DnnVv3VfHxaYJk87sGHpw_0zgQCQJi";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let chartInstance = null;
        let currentFilter = 'all';
        let transactions = [];

        function showScreen(screen) {
            document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById('screen-' + screen).classList.remove('hidden');
        }

        async function handleSignup() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;
            const name = document.getElementById('reg-name').value;
            if(!email || !password) return alert("Preencha os dados");

            const { data, error } = await _supabase.auth.signUp({
                email, password, options: { data: { full_name: name } }
            });

            if (error) alert(error.message);
            else { alert("Cadastro realizado! Verifique seu e-mail."); showScreen('login'); }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) alert(error.message);
            else {
                currentUser = data.user;
                showScreen('app');
                await loadTransactions();
            }
        }

        async function logout() {
            await _supabase.auth.signOut();
            currentUser = null;
            showScreen('login');
        }

        async function loadTransactions() {
            const { data, error } = await _supabase
                .from('transactions')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('date', { ascending: false });

            if (!error) {
                transactions = data;
                updateUI();
            }
        }

        async function addTransaction(type) {
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const is_debt = document.getElementById('is-debt').value === 'true';
            const date = document.getElementById('date-input').value;

            if (!desc || isNaN(amount) || !date) return alert("Dados inválidos");

            const newTransaction = {
                user_id: currentUser.id,
                desc, amount, type, date, is_debt,
                paid: !is_debt
            };

            const { data, error } = await _supabase.from('transactions').insert([newTransaction]).select();

            if (!error) {
                transactions.unshift(data[0]);
                document.getElementById('desc').value = '';
                document.getElementById('amount').value = '';
                updateUI();
            } else {
                alert("Erro ao salvar: " + error.message);
            }
        }

        async function togglePaid(id) {
            const t = transactions.find(item => item.id === id);
            const { error } = await _supabase
                .from('transactions')
                .update({ paid: !t.paid })
                .eq('id', id);

            if (!error) {
                t.paid = !t.paid;
                updateUI();
            }
        }

        async function remove(id) {
            if(confirm("Deseja excluir?")) {
                const { error } = await _supabase.from('transactions').delete().eq('id', id);
                if (!error) {
                    transactions = transactions.filter(t => t.id !== id);
                    updateUI();
                }
            }
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.replace('bg-indigo-600', 'bg-white');
                btn.classList.replace('text-white', 'text-gray-500');
            });
            const active = document.getElementById('filter-' + filter);
            if(active) {
                active.classList.replace('bg-white', 'bg-indigo-600');
                active.classList.replace('text-gray-500', 'text-white');
            }
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('transaction-list');
            let balance = 0, income = 0, pending = 0;
            const today = new Date().toISOString().split('T')[0];

            list.innerHTML = '';
            
            let filtered = transactions;
            if (currentFilter === 'today') filtered = transactions.filter(t => t.date === today);
            else if (currentFilter === 'pending') filtered = transactions.filter(t => !t.paid);

            transactions.forEach(t => {
                if (t.type === 'income' && t.paid) { income += t.amount; balance += t.amount; }
                else if (t.type === 'expense') {
                    if (t.paid) balance -= t.amount;
                    else pending += t.amount;
                }
            });

            filtered.forEach(t => {
                const isInc = t.type === 'income';
                list.innerHTML += `
                    <div class="bg-white p-5 rounded-[2rem] border border-gray-50 flex items-center justify-between shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center ${isInc ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">
                                ${isInc ? '↑' : '↓'}
                            </div>
                            <div>
                                <h4 class="font-bold text-sm text-gray-800">${t.desc}</h4>
                                <p class="text-[10px] text-gray-400">${t.date}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 text-right">
                            <div>
                                <p class="font-black text-sm ${isInc ? 'text-emerald-600' : 'text-rose-600'}">
                                    R$ ${t.amount.toLocaleString('pt-BR')}
                                </p>
                                <button onclick="remove('${t.id}')" class="text-[9px] text-gray-300 uppercase font-bold">Remover</button>
                            </div>
                            ${t.is_debt ? `
                                <button onclick="togglePaid('${t.id}')" class="w-10 h-10 rounded-xl flex items-center justify-center border-2 ${t.paid ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-orange-100 text-orange-200'}">
                                    ✓
                                </button>
                            ` : ''}
                        </div>
                    </div>`;
            });

            document.getElementById('total-balance').innerText = `R$ ${balance.toLocaleString('pt-BR')}`;
            document.getElementById('total-income').innerText = `R$ ${income.toLocaleString('pt-BR')}`;
            document.getElementById('total-pending').innerText = `R$ ${pending.toLocaleString('pt-BR')}`;
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('cashFlowChart').getContext('2d');
            const days = [...Array(7)].map((_, i) => {
                const d = new Date(); d.setDate(d.getDate() - i);
                return d.toISOString().split('T')[0];
            }).reverse();

            const dataIn = days.map(d => transactions.filter(t => t.date === d && t.type === 'income' && t.paid).reduce((s, t) => s + t.amount, 0));
            const dataOut = days.map(d => transactions.filter(t => t.date === d && t.type === 'expense' && t.paid).reduce((s, t) => s + t.amount, 0));

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: days.map(d => d.slice(8,10)),
                    datasets: [
                        { data: dataIn, borderColor: '#10b981', tension: 0.4, pointRadius: 0 },
                        { data: dataOut, borderColor: '#f43f5e', tension: 0.4, pointRadius: 0 }
                    ]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
            });
        }

        document.getElementById('date-input').valueAsDate = new Date();
    </script>
</body>
</html>
